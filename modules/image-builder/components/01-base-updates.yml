name: BaseUpdates
description: Apply base OS updates and configure core system packages for Amazon Linux 2023
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: UpdateOS
        action: ExecuteBash
        inputs:
          commands:
            - echo "Applying base OS updates"
            - dnf update -y --security
            - dnf update -y kernel
      - name: InstallCorePackages
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing core packages"
            - dnf install -y \
                tar \
                gzip \
                unzip \
                zip \
                wget \
                curl \
                jq \
                htop \
                tmux \
                vim-enhanced \
                bash-completion \
                man-pages \
                less \
                findutils \
                which \
                xz \
                bzip2 \
                patch \
                diffutils
      - name: ConfigureTimezone
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring timezone to UTC"
            - timedatectl set-timezone UTC
      - name: ConfigureLimits
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring system limits"
            - |
              cat >> /etc/security/limits.conf <<'EOF'
              * soft nofile 65536
              * hard nofile 65536
              * soft nproc 65536
              * hard nproc 65536
              EOF
  - name: validate
    steps:
      - name: ValidateUpdates
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating base OS updates applied"
            - dnf check-update || [ $? -eq 100 ] || exit 0
            - which jq || exit 1
            - which curl || exit 1
            - which tmux || exit 1
            - timedatectl | grep -q "UTC" || exit 1
