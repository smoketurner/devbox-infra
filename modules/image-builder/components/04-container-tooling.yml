name: ContainerTooling
description: Install container tooling including Docker, containerd, and related utilities
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: InstallDocker
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Docker"
            - dnf install -y docker
            - systemctl enable docker
      - name: ConfigureDocker
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring Docker daemon"
            - mkdir -p /etc/docker
            - |
              cat > /etc/docker/daemon.json <<'EOF'
              {
                "log-driver": "json-file",
                "log-opts": {
                  "max-size": "50m",
                  "max-file": "3"
                },
                "storage-driver": "overlay2",
                "default-ulimits": {
                  "nofile": {
                    "Name": "nofile",
                    "Hard": 65536,
                    "Soft": 65536
                  }
                }
              }
              EOF
      - name: InstallDockerCompose
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Docker Compose plugin"
            - mkdir -p /usr/local/lib/docker/cli-plugins
            - COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | jq -r .tag_name)
            - curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
            - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      - name: InstallBuildx
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Docker Buildx"
            - BUILDX_VERSION=$(curl -s https://api.github.com/repos/docker/buildx/releases/latest | jq -r .tag_name)
            - curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" -o /usr/local/lib/docker/cli-plugins/docker-buildx
            - chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
  - name: validate
    steps:
      - name: ValidateContainerTooling
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating container tooling installed"
            - docker --version || exit 1
            - docker compose version || exit 1
            - docker buildx version || exit 1
            - systemctl is-enabled docker || exit 1
