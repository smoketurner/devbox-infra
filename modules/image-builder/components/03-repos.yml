name: Repos
description: Configure repository access tooling (GitHub CLI)
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: InstallGitHubCLI
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing GitHub CLI"
            - dnf install -y 'dnf-command(config-manager)'
            - dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
            - dnf install -y gh
  - name: validate
    steps:
      - name: ValidateRepos
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating repository access tooling"
            - gh --version || exit 1
  - name: test
    steps:
      - name: TestRepos
        action: ExecuteBash
        inputs:
          commands:
            - echo "=== Testing repo tooling on the booted AMI ==="
            - gh --version || exit 1
            - which git || exit 1
            - echo "Repo tooling verified on boot"
