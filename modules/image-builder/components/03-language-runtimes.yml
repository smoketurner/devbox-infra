name: LanguageRuntimes
description: Install language runtimes including Node.js, Python 3.12, Go, and Rust
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: InstallPython312
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Python 3.12 (base AMI has 3.9)"
            - dnf install -y python3.12 python3.12-pip python3.12-devel
            - alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 100
            - python3.12 -m pip install --upgrade pip setuptools wheel
            - python3.12 -m pip install virtualenv pipx
      - name: InstallNodeJS
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Node.js 22 LTS"
            - dnf install -y nodejs22 nodejs22-npm
            - npm install -g npm@latest
            - npm install -g yarn pnpm typescript
      - name: InstallGo
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Go"
            - "GO_VERSION=$(curl -s 'https://go.dev/dl/?mode=json' | jq -r '.[0].version')"
            - "curl -fsSL \"https://go.dev/dl/${GO_VERSION}.linux-amd64.tar.gz\" -o /tmp/go.tar.gz"
            - tar -C /usr/local -xzf /tmp/go.tar.gz
            - rm -f /tmp/go.tar.gz
            - |
              cat > /etc/profile.d/go.sh <<'EOF'
              export GOROOT=/usr/local/go
              export GOPATH=$HOME/go
              export PATH=$GOROOT/bin:$GOPATH/bin:$PATH
              EOF
            - chmod 644 /etc/profile.d/go.sh
      - name: InstallRust
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Rust toolchain"
            - export RUSTUP_HOME=/opt/rust/rustup
            - export CARGO_HOME=/opt/rust/cargo
            - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile default
            - |
              cat > /etc/profile.d/rust.sh <<'EOF'
              export RUSTUP_HOME=/opt/rust/rustup
              export CARGO_HOME=/opt/rust/cargo
              export PATH=$CARGO_HOME/bin:$PATH
              EOF
            - chmod 644 /etc/profile.d/rust.sh
            - source /etc/profile.d/rust.sh
            - rustup component add clippy rustfmt rust-analyzer
  - name: validate
    steps:
      - name: ValidateLanguageRuntimes
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating language runtimes installed"
            - source /etc/profile.d/go.sh
            - source /etc/profile.d/rust.sh
            - python3.12 --version || exit 1
            - node --version || exit 1
            - npm --version || exit 1
            - go version || exit 1
            - rustc --version || exit 1
            - cargo --version || exit 1
