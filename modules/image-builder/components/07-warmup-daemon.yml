name: WarmupDaemon
description: Install and configure the warm-up daemon service for pre-warming devbox instances
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: CreateWarmupScript
        action: ExecuteBash
        inputs:
          commands:
            - echo "Creating warmup script"
            - mkdir -p /opt/devbox
            - |
              cat > /opt/devbox/warmup.sh <<'EOF'
              #!/bin/bash
              # Devbox warm-up daemon
              # Runs on instance launch to pre-warm caches and verify readiness
              set -euo pipefail

              LOG_TAG="devbox-warmup"

              log() {
                logger -t "$LOG_TAG" "$1"
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) $1"
              }

              log "Starting devbox warm-up sequence"

              # Pull base Docker images for common development workflows
              log "Pulling base Docker images"
              systemctl start docker
              docker pull public.ecr.aws/docker/library/ubuntu:22.04 || true
              docker pull public.ecr.aws/docker/library/node:22-slim || true
              docker pull public.ecr.aws/docker/library/python:3.12-slim || true

              # Warm up DNS resolver
              log "Warming DNS cache"
              nslookup github.com > /dev/null 2>&1 || true
              nslookup registry.npmjs.org > /dev/null 2>&1 || true
              nslookup pypi.org > /dev/null 2>&1 || true

              # Verify disk space
              AVAIL_GB=$(df -BG /workspace | tail -1 | awk '{print $4}' | tr -d 'G')
              log "Available workspace disk: ${AVAIL_GB}G"

              # Signal readiness to SSM
              log "Warm-up complete, signaling readiness"
              aws ssm put-parameter \
                --name "/devbox/instance/$(curl -s http://169.254.169.254/latest/meta-data/instance-id)/status" \
                --value "ready" \
                --type String \
                --overwrite 2>/dev/null || true

              log "Devbox warm-up completed successfully"
              EOF
            - chmod 755 /opt/devbox/warmup.sh
      - name: CreateSystemdService
        action: ExecuteBash
        inputs:
          commands:
            - echo "Creating systemd service for warmup"
            - |
              cat > /etc/systemd/system/devbox-warmup.service <<'EOF'
              [Unit]
              Description=Devbox Instance Warm-up Daemon
              After=network-online.target docker.service amazon-ssm-agent.service
              Wants=network-online.target

              [Service]
              Type=oneshot
              ExecStart=/opt/devbox/warmup.sh
              RemainAfterExit=yes
              StandardOutput=journal
              StandardError=journal

              [Install]
              WantedBy=multi-user.target
              EOF
            - systemctl daemon-reload
            - systemctl enable devbox-warmup.service
  - name: validate
    steps:
      - name: ValidateWarmupDaemon
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating warmup daemon installed"
            - test -x /opt/devbox/warmup.sh || exit 1
            - systemctl is-enabled devbox-warmup.service || exit 1
            - systemctl cat devbox-warmup.service > /dev/null || exit 1
