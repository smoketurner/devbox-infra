name: DevTools
description: Install development tools including compilers, build systems, and utilities
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: InstallBuildEssentials
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing build essentials"
            - dnf groupinstall -y "Development Tools"
            - dnf install -y \
                gcc \
                gcc-c++ \
                make \
                cmake \
                autoconf \
                automake \
                libtool \
                pkgconfig \
                clang \
                llvm \
                openssl-devel \
                zlib-devel \
                libffi-devel \
                readline-devel \
                sqlite-devel \
                bzip2-devel \
                xz-devel
      - name: InstallGit
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing Git"
            - dnf install -y git git-lfs
            - git lfs install --system
      - name: InstallGitConfig
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring global Git settings"
            - |
              git config --system credential.helper 'cache --timeout=3600'
              git config --system init.defaultBranch main
              git config --system core.autocrlf input
      - name: InstallAdditionalTools
        action: ExecuteBash
        inputs:
          commands:
            - echo "Installing additional dev tools"
            - dnf install -y \
                strace \
                ltrace \
                perf \
                valgrind \
                gdb
  - name: validate
    steps:
      - name: ValidateDevTools
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating development tools installed"
            - gcc --version || exit 1
            - g++ --version || exit 1
            - make --version || exit 1
            - cmake --version || exit 1
            - git --version || exit 1
            - git lfs version || exit 1
            - clang --version || exit 1
