name: SSHConfig
description: Configure SSH server with Vouch CA trust for certificate-based authentication
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: ConfigureSSHD
        action: ExecuteBash
        inputs:
          commands:
            - echo "Configuring SSH daemon"
            - cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
            - |
              cat > /etc/ssh/sshd_config.d/99-devbox.conf <<'EOF'
              # Devbox SSH hardening configuration
              PermitRootLogin no
              PasswordAuthentication no
              PubkeyAuthentication yes
              ChallengeResponseAuthentication no
              UsePAM yes
              X11Forwarding no
              PrintMotd no
              AcceptEnv LANG LC_*
              MaxAuthTries 3
              MaxSessions 10
              ClientAliveInterval 60
              ClientAliveCountMax 3
              LoginGraceTime 30
              AllowUsers devbox

              # Vouch SSH certificate authentication
              TrustedUserCAKeys /etc/ssh/vouch_ca.pub
              AuthorizedPrincipalsFile /etc/ssh/auth_principals/%u
              EOF
            - chmod 600 /etc/ssh/sshd_config.d/99-devbox.conf
      - name: ConfigureVouchCA
        action: ExecuteBash
        inputs:
          commands:
            - echo "Fetching Vouch SSH CA public key"
            - curl -s https://us.vouch.sh/v1/credentials/ssh/ca | jq -r '.public_key' > /etc/ssh/vouch_ca.pub
            - chmod 644 /etc/ssh/vouch_ca.pub
            - mkdir -p /etc/ssh/auth_principals
            - chmod 755 /etc/ssh/auth_principals
      - name: GenerateHostKeys
        action: ExecuteBash
        inputs:
          commands:
            - echo "Regenerating SSH host keys"
            - rm -f /etc/ssh/ssh_host_*
            - ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N ""
            - ssh-keygen -t rsa -b 4096 -f /etc/ssh/ssh_host_rsa_key -N ""
  - name: validate
    steps:
      - name: ValidateSSHConfig
        action: ExecuteBash
        inputs:
          commands:
            - echo "Validating SSH configuration"
            - sshd -t || exit 1
            - test -f /etc/ssh/vouch_ca.pub || exit 1
            - test -s /etc/ssh/vouch_ca.pub || exit 1
            - test -d /etc/ssh/auth_principals || exit 1
            - grep -q "TrustedUserCAKeys" /etc/ssh/sshd_config.d/99-devbox.conf || exit 1
            - grep -q "PermitRootLogin no" /etc/ssh/sshd_config.d/99-devbox.conf || exit 1
            - grep -q "PasswordAuthentication no" /etc/ssh/sshd_config.d/99-devbox.conf || exit 1
